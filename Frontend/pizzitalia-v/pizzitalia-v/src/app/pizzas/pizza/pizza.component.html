<form [formGroup]="service.form" class="normal-form" (submit)="onSubmit()">
  <mat-grid-list cols="1" rowHeight="500px">
      <mat-grid-tile>
      <div class="controles-container">
        <input type="hidden" formControlName="id" >
        <mat-form-field appearance="legacy">
          <input formControlName="name" matInput placeholder="Pizza Name*" >
          <mat-error>This field is mandatory.</mat-error>
        </mat-form-field>
        
          <div class="add-bottom-padding">
              <mat-radio-group formControlName="type">
                <mat-radio-button value="1">Veg</mat-radio-button>
                <mat-radio-button value="2">Non-Veg</mat-radio-button>
              </mat-radio-group>
             
          </div>
        <mat-form-field appearance="outline">
          <textarea formControlName="description" matInput placeholder="Description*"></textarea>
          <mat-error>This field is mandatory.</mat-error>
        </mat-form-field>
        <mat-form-field appearance="legacy">
          <input type="number" formControlName="price" matInput placeholder="Price*" >
          <mat-error>This field is mandatory.</mat-error>
        </mat-form-field>
        <mat-form-field appearance="legacy">
          <input formControlName="url" matInput placeholder="Url*">
          <mat-error>This field is mandatory.</mat-error>
        </mat-form-field>
        <div class="button-row">
          <button mat-raised-button color="primary" type="submit" [disabled]="service.form.invalid" >Submit</button>
          <button mat-raised-button color="warn" (click)="onClear()">Clear</button>
        </div>
      </div>
    </mat-grid-tile>
  </mat-grid-list>
</form>
